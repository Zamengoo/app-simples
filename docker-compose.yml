services:
  db:
    image: postgres:15-alpine
    container_name: zamengo_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - zamengo_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: zamengo_api
    restart: always
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "3015:3015"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3015/tarefas"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: ./frontend
    container_name: zamengo_web
    ports:
      - "8015:80"
    depends_on:
      - api

volumes:
  zamengo_data: 