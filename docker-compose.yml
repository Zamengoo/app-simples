services:
  db:
    image: postgres:15-alpine
    container_name: zamengo_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - zamengo_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: zamengo_api
    restart: always
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "3015:3000"

  web:
    build: ./frontend
    container_name: zamengo_web
    ports:
      - "8015:80"
    depends_on:
      - api

volumes:
  zamengo_data: zamengo_data