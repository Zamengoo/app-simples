name: App Simples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  security:
    runs-on: ubuntu-latest  
    steps:   
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache de Dependências
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm ci
        
      - name: Testar npm
        run: npm test

      - name: Rodar lint
        run: npm run lint

      - name: Rodar Coverage
        run: npm run coverage

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high 

  quality:
    runs-on: ubuntu-latest
    needs: security
  
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache de Dependências
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm ci

      - name: Rodar lint
        run: npm run lint

      - name: Rodar Coverage
        run: npm run coverage

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache de Dependências
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm ci

      - name: Gerar artefato
        run: zip -r app.zip .

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip

  deploy: 
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~
            if [ ! -d "zamengo-app" ]; then
              git clone https://github.com/${{ github.repository }} zamengo-app
            fi
            cd zamengo-app
            git pull origin main
            docker compose pull
            docker compose up -d